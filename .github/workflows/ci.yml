name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/uv.lock'

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check (mypy --strict)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/uv.lock'

      - name: Install dependencies
        run: uv sync --group dev

      - name: mypy strict
        run: uv run mypy src/omnibase_spi --strict

  # ---------------------------------------------------------------------------
  # Detect Changes — emits matrix/split_count/is_full_suite for test-parallel.
  # When ENABLE_SMART_TESTS is off (default), emits 40-shard full-suite matrix.
  # When on and change set is small, emits a smaller matrix + selected_paths.
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    outputs:
      is_full_suite: ${{ steps.detect.outputs.is_full_suite }}
      full_suite_reason: ${{ steps.detect.outputs.full_suite_reason }}
      split_count: ${{ steps.detect.outputs.split_count }}
      matrix: ${{ steps.detect.outputs.matrix }}
      selected_paths: ${{ steps.detect.outputs.selected_paths }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/uv.lock'

      - name: Install dependencies
        run: uv sync --group dev

      - name: Compute changed files
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base" || true
            git diff --name-only "$base"...HEAD > changed.txt
          else
            git diff --name-only HEAD~1 HEAD > changed.txt || echo "" > changed.txt
          fi
          echo "Changed files:"
          cat changed.txt

      - name: Resolve test selection
        id: detect
        env:
          FLAG: ${{ vars.ENABLE_SMART_TESTS == 'true' && 'on' || 'off' }}
        run: |
          uv run python -m scripts.ci.detect_test_paths \
            --changed-files-from changed.txt \
            --ref-name "${{ github.ref_name }}" \
            --event-name "${{ github.event_name }}" \
            --feature-flag "$FLAG" \
            > selection.json
          cat selection.json
          is_full=$(jq -r '.is_full_suite' selection.json)
          reason=$(jq -r '.full_suite_reason // ""' selection.json)
          split_count=$(jq -r '.split_count' selection.json)
          matrix=$(jq -c '.matrix' selection.json)
          paths=$(jq -c '.selected_paths' selection.json)
          echo "is_full_suite=$is_full" >> "$GITHUB_OUTPUT"
          echo "full_suite_reason=$reason" >> "$GITHUB_OUTPUT"
          echo "split_count=$split_count" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "selected_paths=$paths" >> "$GITHUB_OUTPUT"

      - name: Upload selection artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-selection
          path: selection.json
          retention-days: 7

  # Parallel test execution — matrix shape driven by detect-changes output.
  test-parallel:
    name: Tests (Split ${{ matrix.split }}/${{ needs.detect-changes.outputs.split_count }})
    needs: [lint, typecheck, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        split: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/uv.lock'

      - name: Install dependencies
        run: uv sync --group dev

      - name: Restore test durations cache
        uses: actions/cache/restore@v5
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}
          restore-keys: |
            test-durations-

      - name: Run pytest (smart selection)
        if: vars.ENABLE_SMART_TESTS == 'true' && needs.detect-changes.outputs.is_full_suite == 'false'
        run: |
          paths=$(echo '${{ needs.detect-changes.outputs.selected_paths }}' | jq -r '.[]')
          uv run pytest $paths \
            --ignore=tests/integration \
            --splits ${{ needs.detect-changes.outputs.split_count }} \
            --group ${{ matrix.split }} \
            --tb=short \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Run pytest (full suite)
        if: vars.ENABLE_SMART_TESTS != 'true' || needs.detect-changes.outputs.is_full_suite == 'true'
        run: |
          uv run pytest tests/ \
            --ignore=tests/integration \
            --splits ${{ needs.detect-changes.outputs.split_count }} \
            --group ${{ matrix.split }} \
            --store-durations \
            --durations-path .test_durations \
            --tb=short \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Save test durations (full suite only, split 1)
        if: |
          needs.detect-changes.outputs.is_full_suite == 'true' &&
          matrix.split == 1 &&
          success()
        uses: actions/cache/save@v5
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.split }}
          path: junit-${{ matrix.split }}.xml
          retention-days: 7

  build-and-verify:
    name: Build & Package Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck, test-parallel, contract-compliance]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: '**/uv.lock'

      - name: Build wheel and sdist
        run: uv build

      - name: Verify dist artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -la dist/
          ls dist/*.whl dist/*.tar.gz || {
            echo "ERROR: expected wheel + sdist in dist/"
            exit 1
          }
          echo "Build artifacts verified."

      - name: Verify version consistency
        run: |
          PKG_VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          print(d['project']['version'])
          ")
          echo "pyproject.toml version: $PKG_VERSION"

          # Verify the wheel filename contains the correct version
          WHEEL=$(ls dist/*.whl)
          if [[ "$WHEEL" != *"$PKG_VERSION"* ]]; then
            echo "ERROR: wheel filename does not contain version $PKG_VERSION"
            echo "Wheel: $WHEEL"
            exit 1
          fi
          echo "Version consistency verified: $PKG_VERSION"

      - name: Install in clean environment and verify import
        run: |
          # Create a fresh venv without dev dependencies
          uv venv /tmp/test-install --python 3.12
          WHEEL=$(ls dist/*.whl)
          echo "Installing: $WHEEL"
          uv pip install "$WHEEL" --python /tmp/test-install/bin/python

          # Verify the package imports correctly
          /tmp/test-install/bin/python -c "
          import omnibase_spi
          from omnibase_spi.protocols import ProtocolLogger, ProtocolHealthMonitor
          from omnibase_spi.protocols.types import LiteralLogLevel
          from omnibase_spi.exceptions import SPIError

          # Verify Protocol classes are real protocols
          from typing import Protocol
          assert issubclass(ProtocolLogger, Protocol), 'ProtocolLogger is not a Protocol'
          assert issubclass(ProtocolHealthMonitor, Protocol), 'ProtocolHealthMonitor is not a Protocol'

          print(f'omnibase_spi imported successfully')
          print(f'Package location: {omnibase_spi.__file__}')
          print(f'Protocols verified: ProtocolLogger, ProtocolHealthMonitor')
          print(f'Types verified: LiteralLogLevel')
          print(f'Exceptions verified: SPIError')
          print('Clean environment install: PASSED')
          "

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.whl *.tar.gz | tee SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  tests-gate:
    name: Tests Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test-parallel]
    if: always()
    steps:
      - name: Evaluate tests gate
        run: |
          RESULT="${{ needs.test-parallel.result }}"
          if [ "${RESULT}" = "success" ]; then
            echo "Tests Gate PASSED (result=${RESULT})"
          else
            echo "Tests Gate FAILED: test-parallel result=${RESULT}"
            exit 1
          fi

  ai-slop-check:
    name: AI-Slop Pattern Check (strict, PR diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Compute changed Python/Markdown files vs PR base
        id: changed
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git fetch origin "${{ github.base_ref }}" --no-tags --depth=1
            FILES=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- '*.py' '*.md' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only HEAD~1 -- '*.py' '*.md' 2>/dev/null | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
      - name: Check changed files for AI-slop patterns (strict)
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          if [ -z "$FILES" ]; then exit 0; fi
          python scripts/validation/check_ai_slop.py --strict $FILES


  contract-compliance:
    name: Contract Compliance Check
    # OMNI_RUNNER_SELECTOR_V1 - trusted events default to self-hosted omnibase-ci; pull_request defaults to ubuntu-latest
    runs-on: >-
      ${{
        github.event_name != 'pull_request'
        && fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
        || fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Checkout onex_change_control
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/onex_change_control
          path: onex_change_control

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'onex_change_control/uv.lock'

      - name: Install onex_change_control
        working-directory: onex_change_control
        run: uv sync --all-extras

      - name: Validate contract YAML files
        working-directory: onex_change_control
        run: |
          CONTRACTS=$(find "$GITHUB_WORKSPACE/onex_change_control/contracts" -name "OMN-*.yaml" 2>/dev/null)
          if [ -z "$CONTRACTS" ]; then
            echo "No contract YAML files found — skipping validation"
            exit 0
          fi
          uv run validate-yaml $CONTRACTS
        env:
          GH_TOKEN: ${{ github.token }}

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-and-verify, tests-gate]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required jobs passed"
